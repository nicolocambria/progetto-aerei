# =============================================================================
# logstash.conf — Data Ingestion, tappa 2 (arricchimento, validazione, routing)
#
# Flusso: collector --HTTP POST--> [input http] --> [filter] --> [output]
#
#   - arricchimento : event_type, ingest_ts (tempo di ingestione)
#   - timestamp     : @timestamp = event_time (tempo di OSSERVAZIONE, non di
#                     ingestione → watermark e analisi temporali corretti)
#   - validazione   : lat/lon obbligatorie, altrimenti tag missing_position
#   - routing       : telemetria valida → Kafka flights.telemetry (+ ES per
#                     osservabilità immediata); eventi invalidi → DLQ;
#                     tutto il resto → flights.raw (fallback)
# =============================================================================

input {
  # Riceve gli eventi JSON del collector sulla porta 5044.
  http {
    host  => "0.0.0.0"
    port  => 5044
    codec => "json"
  }
}

filter {
  # Arricchimento con metadati + pulizia dei campi tecnici dell'input http
  # (il plugin http in ES 8 aggiunge url/user_agent/http/event: rumore ECS
  # che non fa parte dello schema canonico → rimosso).
  mutate {
    add_field => {
      "event_type" => "flight_telemetry"
      "ingest_ts"  => "%{@timestamp}"
    }
    remove_field => ["headers", "@version", "host", "url", "user_agent", "http", "event"]
  }

  # Timestamp autorevole dell'evento: il tempo di osservazione (event_time)
  # sostituisce il tempo di arrivo in Logstash.
  date {
    match  => ["event_time", "ISO8601"]
    target => "@timestamp"
  }

  # Validazione: la telemetria senza coordinate non è utilizzabile
  # (niente mappa, niente geofence) → instradata in Dead Letter Queue.
  if ![lat] or ![lon] or [lat] == "" or [lon] == "" {
    mutate {
      add_tag   => ["missing_position"]
      add_field => { "dlq_reason" => "missing_position" }
    }
  } else {
    # Campo geo_point "lat,lon" per la mappa Kibana (il mapping è fissato
    # dall'index template flights-telemetry creato su Elasticsearch).
    mutate {
      add_field => {
        "stream"   => "telemetry"
        "location" => "%{lat},%{lon}"
      }
    }
  }
}

output {
  if [stream] == "telemetry" {
    # Doppio sink: Kafka per il processing a valle (Spark),
    # Elasticsearch per l'osservabilità immediata in Kibana.
    kafka {
      bootstrap_servers => "kafka:29092"
      topic_id          => "flights.telemetry"
      codec             => json { ecs_compatibility => disabled }
      acks              => "1"
      compression_type  => "lz4"
    }
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "flights-telemetry"
    }
  } else if "missing_position" in [tags] {
    # DLQ: gli eventi scartati restano osservabili, mai persi in silenzio.
    kafka {
      bootstrap_servers => "kafka:29092"
      topic_id          => "flights.dlq"
      codec             => json { ecs_compatibility => disabled }
    }
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "flights-dlq"
    }
  } else {
    # Fallback: eventi non classificati.
    kafka {
      bootstrap_servers => "kafka:29092"
      topic_id          => "flights.raw"
      codec             => json { ecs_compatibility => disabled }
    }
  }
}
