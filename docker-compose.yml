# =============================================================================
# Real-Time Flight Telemetry Anomaly Monitoring & Alerting Pipeline (ADS-B v2)
# Progetto per l'esame di Technologies for Advanced Programming — UniCT DMI
#
# NOTA IMPORTANTE PER MACCHINE CON POCA RAM (es. Mac M1 8GB / Docker 5.5GB):
# NON lanciare mai `docker compose up -d` senza argomenti: accenderebbe tutto
# insieme e saturerebbe la memoria. Avviare i servizi A STADI:
#
#   STADIO 1 (infrastruttura + ingestion):
#     docker compose up -d zookeeper kafka kafka-init elasticsearch logstash collector
#   STADIO 3 (alert rule-based):
#     docker compose up -d spark-alerts ml-indexer
#   STADIO 4 (cold path — UN SOLO job Spark alla volta):
#     docker compose stop spark-alerts
#     docker compose up -d spark-parquet
#     ... training ... poi:
#     docker compose stop spark-parquet
#     docker compose up -d spark-ml-inference
#   STADIO 5 (visualizzazione):
#     docker compose stop spark-ml-inference   # libera RAM per Kibana
#     docker compose up -d kibana
#
# I servizi "pesanti" (job Spark, Kibana, kafka-ui) sono protetti da un
# "profile": un `docker compose up -d` generico NON li avvia; partono solo
# se nominati esplicitamente. Ogni servizio ha inoltre un limite di memoria
# esplicito (mem_limit) per proteggere l'host.
# =============================================================================

version: "3.8"

services:

  # ---------------------------------------------------------------------------
  # ZooKeeper: coordinatore del cluster Kafka (metadati broker, elezioni).
  # Heap JVM ridotto a 128MB: per un singolo broker locale è più che sufficiente.
  # ---------------------------------------------------------------------------
  zookeeper:
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx128m"
    volumes:
      - zkdata:/var/lib/zookeeper/data
      - zkdatalog:/var/lib/zookeeper/log
    mem_limit: 384m
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kafka: bus a eventi. Doppio listener:
  #  - PLAINTEXT (kafka:29092)       → per i container interni alla rete compose
  #  - PLAINTEXT_HOST (localhost:9092) → per strumenti lanciati dal Mac
  # Replication factor 1 ovunque perché il broker è singolo (setup didattico).
  # ---------------------------------------------------------------------------
  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - kafkadata:/var/lib/kafka/data
    mem_limit: 768m
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # kafka-init: container "one-shot" che crea i 5 topic in modo idempotente
  # e poi termina. Non ci si affida all'auto-create (nasconderebbe i typo).
  # ---------------------------------------------------------------------------
  kafka-init:
    container_name: kafka-init
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [kafka]
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      LOG_DIR: /tmp
    volumes:
      - ./kafka/init-topics.sh:/init-topics.sh:ro
    entrypoint: ["/bin/bash", "-lc"]
    command: ["bash /init-topics.sh"]
    mem_limit: 512m
    restart: "on-failure"

  # ---------------------------------------------------------------------------
  # Kafka-UI (OPZIONALE, profilo "ui"): ispezione visuale di topic/consumer.
  # Su 8GB di RAM va acceso solo per brevi verifiche, da solo:
  #   docker compose up -d kafka-ui   → http://localhost:8080
  # ---------------------------------------------------------------------------
  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    profiles: ["ui"]
    depends_on: [kafka]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    mem_limit: 512m
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Elasticsearch: motore di indicizzazione e query (backend di Kibana).
  # Single-node, sicurezza disabilitata (solo per uso didattico locale!).
  # Heap 512MB come da specifica; mem_limit più alto per l'off-heap di Lucene.
  # ---------------------------------------------------------------------------
  elasticsearch:
    container_name: elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    mem_limit: 1200m
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kibana (profilo "viz"): dashboard e mappa. Va acceso SOLO allo stadio 5,
  # dopo aver spento i job Spark:  docker compose up -d kibana
  # ---------------------------------------------------------------------------
  kibana:
    container_name: kibana
    image: docker.elastic.co/kibana/kibana:8.12.2
    profiles: ["viz"]
    depends_on: [elasticsearch]
    ports:
      - "5601:5601"
    environment:
      - SERVER_HOST=0.0.0.0
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - kibanadata:/usr/share/kibana/data
    mem_limit: 1g
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Logstash: seconda tappa dell'ingestion. Riceve gli eventi via HTTP dal
  # collector, li arricchisce/valida e li instrada verso Kafka (+ ES per
  # l'osservabilità immediata). Gli eventi senza posizione finiscono in DLQ.
  # Heap ridotto a 384MB (dai 512MB della specifica) per stare negli 8GB.
  # ---------------------------------------------------------------------------
  logstash:
    container_name: logstash
    build: ./logstash
    depends_on: [kafka, kafka-init, elasticsearch]
    environment:
      - LS_JAVA_OPTS=-Xms384m -Xmx384m -XX:ActiveProcessorCount=2
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"
    command: ["logstash", "-f", "/usr/share/logstash/pipeline/logstash.conf", "-w", "2", "-b", "200"]
    mem_limit: 900m
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Collector Python: prima tappa dell'ingestion. Ogni POLL_INTERVAL secondi
  # interroga l'API ADS-B (default: adsb.fi, gratuita e senza chiave),
  # normalizza ogni aeromobile allo schema canonico e lo POSTa a Logstash.
  # I parametri (sorgente, area geografica) arrivano dal file .env.
  # ---------------------------------------------------------------------------
  collector:
    container_name: collector
    build: ./collector
    depends_on: [logstash]
    env_file: .env
    environment:
      - LOGSTASH_URL=http://logstash:5044
      - POLL_INTERVAL=${POLL_INTERVAL:-30}
      - SOURCE=${SOURCE:-adsbfi}          # adsbfi | airplaneslive | opensky
      - AREA_LAT=${AREA_LAT:-41.9}
      - AREA_LON=${AREA_LON:-12.5}
      - AREA_DIST_NM=${AREA_DIST_NM:-250}
    mem_limit: 128m
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SPARK JOB 1 (profilo "spark"): alert rule-based.
  # Legge flights.telemetry, applica le regole deterministiche (squawk di
  # emergenza, outlier fisici, geofence) e pubblica su flights.alerts.
  # La cache Ivy (./data/ivy2) evita di riscaricare il connettore Kafka
  # ad ogni riavvio del container.
  # ---------------------------------------------------------------------------
  spark-alerts:
    container_name: spark-alerts
    build: ./spark
    profiles: ["spark"]
    depends_on: [kafka, kafka-init]
    environment:
      - KAFKA_BOOTSTRAP=kafka:29092
      - TOPIC_IN=flights.telemetry
      - TOPIC_OUT=flights.alerts
      - CHECKPOINT_DIR=/data/chk/flights_alerts
      - STARTING_OFFSETS=latest
      - ALT_MAX_FT=${ALT_MAX_FT:-60000}
      - SPEED_MAX_KT=${SPEED_MAX_KT:-700}
      - VS_MAX_FPM=${VS_MAX_FPM:-10000}
      - GEO_LAT_MIN=${GEO_LAT_MIN:-45.40}
      - GEO_LAT_MAX=${GEO_LAT_MAX:-45.55}
      - GEO_LON_MIN=${GEO_LON_MIN:-9.10}
      - GEO_LON_MAX=${GEO_LON_MAX:-9.30}
    volumes:
      - ./spark:/app:ro
      - ./data:/data
      - ./data/ivy2:/root/.ivy2
    command: ["spark-submit",
              "--driver-memory", "1g",
              "--conf", "spark.sql.shuffle.partitions=8",
              "--conf", "spark.ui.enabled=false",
              "--packages", "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1",
              "/app/flights_spark_alerts.py"]
    mem_limit: 1900m
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SPARK JOB 2 (profilo "spark"): persistenza nel data lake Parquet.
  # STARTING_OFFSETS=earliest: al primo avvio rilegge TUTTA la telemetria
  # accumulata in Kafka dagli stadi precedenti (retention 7gg) → più storico
  # per il training senza dover tenere il job acceso a lungo.
  # ---------------------------------------------------------------------------
  spark-parquet:
    container_name: spark-parquet
    build: ./spark
    profiles: ["spark"]
    depends_on: [kafka, kafka-init]
    environment:
      - KAFKA_BOOTSTRAP=kafka:29092
      - TOPIC_IN=flights.telemetry
      - PARQUET_PATH=/data/telemetry_parquet/flights
      - CHECKPOINT_DIR=/data/chk/flights_to_parquet
      - STARTING_OFFSETS=earliest
    volumes:
      - ./spark:/app:ro
      - ./data:/data
      - ./data/ivy2:/root/.ivy2
    command: ["spark-submit",
              "--driver-memory", "1g",
              "--conf", "spark.sql.shuffle.partitions=8",
              "--conf", "spark.ui.enabled=false",
              "--packages", "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1",
              "/app/flights_to_parquet.py"]
    mem_limit: 1900m
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SPARK JOB 3 (profilo "spark"): inferenza ML in streaming.
  # Carica la PipelineModel addestrata (train_flight_mllib.py) e fa scoring
  # in tempo reale sulla telemetria; pubblica su flights.ml-alerts.
  # NB: richiede che il modello esista in /data/models/flight_anomaly_clf.
  # ---------------------------------------------------------------------------
  spark-ml-inference:
    container_name: spark-ml-inference
    build: ./spark
    profiles: ["spark"]
    depends_on: [kafka, kafka-init]
    environment:
      - KAFKA_BOOTSTRAP=kafka:29092
      - TOPIC_IN=flights.telemetry
      - TOPIC_OUT=flights.ml-alerts
      - MODEL_PATH=/data/models/flight_anomaly_clf
      - PROB_WARN=${PROB_WARN:-0.60}
      - PROB_CRIT=${PROB_CRIT:-0.85}
      - CHECKPOINT_DIR=/data/chk/flights_ml_inference
      - STARTING_OFFSETS=latest
    volumes:
      - ./spark:/app:ro
      - ./data:/data
      - ./data/ivy2:/root/.ivy2
    command: ["spark-submit",
              "--driver-memory", "1g",
              "--conf", "spark.sql.shuffle.partitions=8",
              "--conf", "spark.ui.enabled=false",
              "--packages", "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1",
              "/app/flights_ml_inference.py"]
    mem_limit: 1900m
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Indexer Python: ponte Kafka → Elasticsearch. Consuma i topic di alert e
  # indicizza con ID deterministico topic-partition-offset (idempotenza:
  # un replay non crea duplicati). Sostituisce il fragile es-hadoop.
  # Container leggero: va acceso insieme ai job Spark di alerting.
  # ---------------------------------------------------------------------------
  ml-indexer:
    container_name: ml-indexer
    image: python:3.11-slim
    profiles: ["spark"]
    depends_on: [kafka, kafka-init, elasticsearch]
    working_dir: /app
    environment:
      - KAFKA_BOOTSTRAP=kafka:29092
      - TOPICS=flights.alerts,flights.ml-alerts
      - ES_URL=http://elasticsearch:9200
      - ES_INDEX_PREFIX=flights
      - KAFKA_GROUP_ID=flights-indexer-live-1
      - KAFKA_AUTO_OFFSET_RESET=latest
    volumes:
      - ./indexer/indexer.py:/app/indexer.py:ro
    command:
      - "bash"
      - "-lc"
      - "pip install --no-cache-dir kafka-python==2.0.2 elasticsearch==8.12.1 && python /app/indexer.py"
    mem_limit: 256m
    restart: unless-stopped

volumes:
  esdata:
  kibanadata:
  kafkadata:
  zkdata:
  zkdatalog:
